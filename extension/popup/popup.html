<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>YouTube Sync</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light Theme (default) */
      --bg-color: #ffffff;
      --panel-bg: rgba(0, 0, 0, 0.02);
      --border-color: rgba(0, 0, 0, 0.08);
      --text-primary: #171717;
      --text-secondary: #737373;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --btn-active-bg: #eff6ff;
      --btn-active-border: #3b82f6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* Dark Theme: full black background */
        --bg-color: #000000;
        --panel-bg: rgba(255, 255, 255, 0.04);
        --border-color: rgba(255, 255, 255, 0.12);
        --text-primary: #f5f5f5;
        --text-secondary: #a3a3a3;
        --accent-color: #3b82f6;
        --accent-hover: #60a5fa;
        --success-color: #10b981;
        --danger-color: #ef4444;
        --warning-color: #f59e0b;
        --btn-active-bg: #172554;
        --btn-active-border: #3b82f6;
      }
    }

    html {
      background-color: var(--bg-color);
      border-radius: 12px;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 20px;
      width: 290px;
      background-color: var(--bg-color);
      font-family: 'Nunito', sans-serif;
      color: var(--text-primary);
      font-size: 14px;
      border-radius: 12px;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--text-primary);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 14px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--danger-color);
    }

    .status-dot.connected {
      background-color: var(--success-color);
      box-shadow: 0 0 6px var(--success-color);
    }

    .status-dot.connecting {
      background-color: var(--warning-color);
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-top: 0;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 4px 0;
    }

    .role-btn {
      position: relative;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      overflow: visible;
      z-index: 1;
    }

    .role-btn:hover {
      color: var(--text-primary);
      border-color: rgba(255, 255, 255, 0.15);
      background: var(--panel-bg);
    }

    .role-btn.active {
      color: var(--text-primary);
      background: var(--btn-active-bg);
      border-color: var(--btn-active-border);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }


    .role-desc {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-secondary);
      text-align: center;
      transition: color 0.3s ease;
    }

    .role-btn.active .role-desc {
      color: var(--text-secondary);
    }

    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      padding: 4px 0 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--border-color);
      transition: .25s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: var(--text-secondary);
      transition: .25s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--accent-color);
    }

    input:checked+.slider:before {
      transform: translateX(18px);
      background-color: #ffffff;
    }

    #role-card.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .follower-notice {
      margin-top: 12px;
      padding: 10px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 10px;
      color: var(--warning-color);
      font-size: 12px;
      text-align: center;
      font-weight: 600;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .warning-container {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 4px 0;
    }

    .warning-icon {
      font-size: 16px;
      line-height: 1;
      animation: pulse 1.5s infinite ease-in-out;
    }

    .warning-text {
      font-size: 13px;
      line-height: 1.4;
      color: var(--text-secondary);
    }

    .sync-tab-info {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }

    .sync-tab-title-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .sync-tab-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px;
    }

    .youtube-icon {
      flex-shrink: 0;
    }

    .sync-tab-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .footer {
      font-size: 11px;
      text-align: center;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1 class="title">YouTube Sync</h1>
      <div class="status-badge">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Offline</span>
      </div>
    </div>

    <div class="toggle-container">
      <span>Enable Synchronization</span>
      <label class="switch">
        <input type="checkbox" id="sync-enable-toggle">
        <span class="slider round"></span>
      </label>
    </div>

    <div id="role-card">
      <h2 class="section-title">Select Sync Role</h2>
      <div class="role-selector">
        <button id="btn-host" class="role-btn">
          <span>Host (Main)</span>
          <span class="role-desc">Publishes playback</span>
        </button>
        <button id="btn-follower" class="role-btn">
          <span>Follower</span>
          <span class="role-desc">Follows Host</span>
        </button>
      </div>
      <div id="follower-paused-notice" class="follower-notice" style="display: none;">
        You have paused the video, press play to continue syncing
      </div>
    </div>

    <div class="card" id="warning-card" style="display: none;">
      <div class="warning-container">
        <span class="warning-icon">⚠️</span>
        <span class="warning-text" id="warning-text">Please open YouTube.com to start synchronization.</span>
      </div>
      <div id="sync-tab-info" class="sync-tab-info" style="display: none;">
        <div class="sync-tab-title-label">Active Syncing Tab:</div>
        <div class="sync-tab-row">
          <svg class="youtube-icon" viewBox="0 0 24 24" width="16" height="16">
            <path fill="#ef4444"
              d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.518 3.545 12 3.545 12 3.545s-7.518 0-9.388.508a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.87.508 9.388.508 9.388.508s7.518 0 9.388-.508a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
          </svg>
          <span id="sync-tab-title" class="sync-tab-title">YouTube Video Title</span>
        </div>
      </div>
    </div>

    <div class="footer">
      Connected to viraj-homelab.online
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
